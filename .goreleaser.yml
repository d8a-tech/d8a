version: 2

project_name: d8a

builds:
  - id: d8a
    main: .
    binary: d8a
    ldflags:
      - -s -w -X github.com/d8a-tech/d8a/pkg/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - d8a
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  use: github-native
